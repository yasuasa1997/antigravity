steps:
  # 1. Dockerイメージのビルド
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/apigijiroku-app:latest', '.']

  # 2. Dockerイメージのプッシュ
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/apigijiroku-app:latest']

  # 3. Cloud Run へのデプロイ
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'apigijiroku-run-service'                 # Cloud Runのサービス名
      - '--image'
      - 'gcr.io/$PROJECT_ID/apigijiroku-app:latest'
      - '--region'
      - 'asia-northeast1'                         # 東京リージョン
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'                 # 一般公開（UIから誰でもアクセス可能にする）
      - '--memory'
      - '2Gi'                                     # ファイルアップロード等に対応するためメモリを2GBに設定
      - '--timeout'
      - '3600'                                    # 処理が長引いた場合に備え、タイムアウトを3600秒（最大）に設定
      - '--no-cpu-throttling'                     # StreamlitのUIから切り離した「別スレッド処理(バックグラウンド処理)」をストップさせないために必須設定
      
      # [注意] 環境変数はCloud Run側（GCPコンソール画面など）で事前に設定するか、以下の行のコメントアウトを外してCloud BuildのSubstitution変数経由で渡します
      # - '--set-env-vars'
      # - 'GEMINI_API_KEY=$_GEMINI_API_KEY,SMTP_SERVER=$_SMTP_SERVER,SMTP_PORT=$_SMTP_PORT,SMTP_USERNAME=$_SMTP_USERNAME,SMTP_PASSWORD=$_SMTP_PASSWORD'

images:
  - 'gcr.io/$PROJECT_ID/apigijiroku-app:latest'
